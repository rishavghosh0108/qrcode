<!-- HERO -->
<section class="hero">
  <div class="container">
    <div class="hero-inner">
      <div>
        <div class="hero-badge"><span class="hero-badge-dot"></span> Free Forever · No Sign-up</div>
        <h1>Generate <span>Beautiful</span><br>QR Codes</h1>
        <p class="hero-sub">Create professional QR codes in seconds. Customize colors, logos, gradients and download in multiple formats.</p>
        <div class="btn-group">
          <button class="btn-primary" onclick="document.getElementById('generatorCard').scrollIntoView({behavior:'smooth'})">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="5" height="5" rx="1"/>
              <rect x="11" y="2" width="5" height="5" rx="1"/>
              <rect x="2" y="11" width="5" height="5" rx="1"/>
              <rect x="12" y="12" width="4" height="4" rx=".5"/>
            </svg>
            Generate QR
          </button>
          <button class="btn-secondary" onclick="document.getElementById('features').scrollIntoView({behavior:'smooth'})">Learn More</button>
        </div>
      </div>
      <div>
        <div class="hero-preview-card">
          <div style="font-size:13px;font-weight:600;color:var(--secondary);letter-spacing:.5px;text-transform:uppercase;">Live Preview</div>
          <div id="heroCanvas" style="min-height:200px;display:flex;align-items:center;justify-content:center;">
            @if (hasPreview()) {
              <img class="hero-qr-image" [src]="previewImageUrl()" [alt]="previewLabel()">
            } @else {
              <div class="qr-placeholder">{{ previewPlaceholder() }}</div>
            }
          </div>
          <div id="heroActions" style="display:none;width:100%">
            <div class="download-row">
              <button class="btn-dl" onclick="downloadQR('png')">PNG</button>
              <button class="btn-dl" onclick="downloadQR('svg-dl')">SVG</button>
              <button class="btn-dl" onclick="downloadQR('jpeg')">JPEG</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
